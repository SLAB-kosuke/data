<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>機械加工履歴システム</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase（後でJS側で初期化） -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- =========================
  HEADER
========================= -->
<header class="top-bar">
  <div class="title">加工履歴システム</div>
</header>

<!-- =========================
  HOME
========================= -->
<main id="homePage" class="page active">

  <button class="menu-btn" onclick="goNewProcess()">新規加工</button>
  <button class="menu-btn" onclick="goContinue()">続きから加工</button>
  <button class="menu-btn" onclick="goCsv()">CSV出力</button>
  <button class="menu-btn">マスタ管理（未実装）</button>

</main>

<!-- =========================
  CONTINUE LIST
========================= -->
<main id="continuePage" class="page">

  <div class="section-title">未完了一覧</div>

  <input type="text" id="searchBox" placeholder="図番 / シリアル検索" />

  <div id="processList"></div>

  <button class="back-btn" onclick="goHome()">戻る</button>
</main>

<!-- =========================
  WORK PAGE
========================= -->
<main id="workPage" class="page">

  <!-- 上部共通情報 -->
  <section class="header-info">

    <div class="row">
      <div>
        <div class="label">図番</div>
        <div id="drawingNo">---</div>
      </div>

      <div>
        <div class="label">シリアル</div>
        <div id="serialNo">---</div>
      </div>
    </div>

    <div class="row">
      <div>
        <div class="label">加工者</div>
        <div id="operator">---</div>
      </div>

      <div>
        <div class="label">設備</div>
        <select id="equipmentSelect" onchange="onEquipmentChange(this.value)">
          <option value="M-1">M-1</option>
          <option value="M-2">M-2</option>
          <option value="Y-1">Y-1</option>
          <option value="Y-2">Y-2</option>
          <option value="E-1">E-1</option>
        </select>
      </div>
    </div>

  </section>

  <!-- カードエリア -->
  <section id="cardContainer" class="card-container"></section>

  <button class="add-btn" onclick="addCard()">＋ 加工追加</button>

  <button class="back-btn" onclick="goHome()">ホーム</button>

</main>

<!-- =========================
  MODAL（設備変更確認）
========================= -->
<div id="equipmentModal" class="modal hidden">
  <div class="modal-box">

    <div class="modal-title">設備を変更しますか？</div>

    <div class="modal-text">
      <div>現在：<span id="currentEq">-</span></div>
      <div>変更：<span id="newEq">-</span></div>
      <p class="note">※以降に追加する加工履歴は新設備で保存されます</p>
    </div>

    <div class="modal-actions">
      <button onclick="cancelEquipmentChange()">キャンセル</button>
      <button onclick="confirmEquipmentChange()">変更</button>
    </div>

  </div>
</div>

<script src="work.js"></script>

</body>
</html>
